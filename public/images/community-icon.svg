<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Three developers represented as circles with connected dots -->
  <g stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left developer -->
    <circle cx="50" cy="70" r="15"/>
    <path d="M 45 90 L 40 120 M 45 90 L 55 120 M 55 90 L 50 120"/>
    
    <!-- Center developer (slightly higher) -->
    <circle cx="100" cy="50" r="15"/>
    <path d="M 95 70 L 90 100 M 95 70 L 105 100 M 105 70 L 100 100"/>
    
    <!-- Right developer -->
    <circle cx="150" cy="70" r="15"/>
    <path d="M 155 90 L 160 120 M 155 90 L 145 120 M 145 90 L 150 120"/>
    
    <!-- Connection lines showing collaboration -->
    <line x1="65" y1="75" x2="85" y2="60"/>
    <line x1="115" y1="60" x2="135" y2="75"/>
    
    <!-- Shared network base -->
    <line x1="40" y1="145" x2="160" y2="145" stroke-width="2"/>
    <circle cx="40" cy="145" r="3" fill="#06b6d4"/>
    <circle cx="100" cy="145" r="3" fill="#06b6d4"/>
    <circle cx="160" cy="145" r="3" fill="#06b6d4"/>
  </g>
</svg>