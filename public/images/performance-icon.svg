<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Bar chart showing performance -->
  <g stroke="#10b981" stroke-width="2.5" stroke-linecap="round">
    <!-- Axes -->
    <line x1="40" y1="150" x2="160" y2="150" stroke-width="2.5"/>
    <line x1="40" y1="30" x2="40" y2="150" stroke-width="2.5"/>
    
    <!-- Bars showing increasing performance -->
    <rect x="55" y="100" width="20" height="50" fill="#10b981" opacity="0.3" stroke="#10b981"/>
    <rect x="55" y="100" width="20" height="50" fill="none"/>
    
    <rect x="85" y="75" width="20" height="75" fill="#10b981" opacity="0.6" stroke="#10b981"/>
    <rect x="85" y="75" width="20" height="75" fill="none"/>
    
    <rect x="115" y="50" width="20" height="100" fill="#10b981" opacity="1" stroke="#10b981"/>
    <rect x="115" y="50" width="20" height="100" fill="none"/>
    
    <!-- Lightning bolt at top showing performance boost -->
    <path d="M 150 40 L 140 55 L 148 55 L 130 75 L 148 65 L 140 65 Z" fill="#10b981"/>
  </g>
</svg>