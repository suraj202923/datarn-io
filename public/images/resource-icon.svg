<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Memory/Storage representation -->
  <g stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Three memory blocks getting smaller (representing efficiency) -->
    <rect x="30" y="40" width="140" height="30" rx="4"/>
    <line x1="30" y1="55" x2="170" y2="55"/>
    
    <rect x="50" y="90" width="100" height="25" rx="3"/>
    <line x1="50" y1="102" x2="150" y2="102"/>
    
    <rect x="70" y="135" width="60" height="20" rx="2"/>
    <line x1="70" y1="145" x2="130" y2="145"/>
  </g>
  
  <!-- Efficiency arrow pointing down -->
  <path d="M 100 160 L 100 175 M 95 170 L 100 175 L 105 170" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>